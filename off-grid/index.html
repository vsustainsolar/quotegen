<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Off-Grid Solar Quotation Builder</title>

  <!-- SAME CSS AS ON-GRID -->
  <link rel="stylesheet" href="../on-grid/style.css" />
</head>

<body>
<header class="page-header">
  <h1>Off-Grid Solar Quotation Builder</h1>
  <a class="back-home" href="../index.html">← Back to Home</a>
</header>

<main class="container">

<!-- CUSTOMER -->
<section class="card">
  <h2>Customer Information</h2>
  <input id="customerName" placeholder="Customer Name" />
  <input id="customerAddress" placeholder="Address" />
</section>

<!-- SYSTEM -->
<section class="card">
  <h2>System Size</h2>
  <input id="systemKw" type="number" placeholder="kW" />
  <input id="commonMargin" type="number" value="20" />
</section>

<!-- INVERTER -->
<section class="card">
  <h2>Off-Grid Inverter</h2>
  <select id="inverterModel"></select>
  <input id="inverterQty" type="number" value="1" />
</section>

<!-- PANELS -->
<section class="card">
  <h2>Solar Panels</h2>
  <select id="panelModel"></select>
  <input id="panelQty" />
</section>

<!-- BATTERY -->
<section class="card">
  <h2>Battery Bank</h2>
  <select id="batteryModel"></select>
  <input id="batteryQty" type="number" value="1" />
</section>

<!-- ACTIONS -->
<section class="card generate-card">
  <button onclick="generateDetailedQuote()">Generate Detailed Quote</button>
  <button onclick="generateSummaryQuote()">Summary Quote</button>
  <button onclick="generateShortQuote()">Short Quote</button>
</section>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
